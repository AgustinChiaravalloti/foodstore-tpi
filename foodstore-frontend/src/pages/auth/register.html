<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Registro</title>
</head>
<body class="bg-orange-500 min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-orange-500 mb-1">Food Store</h1>
    <h2 class="text-lg text-center text-gray-600 mb-6">Registro</h2>

    <form id="register-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input id="nombre" type="text" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-orange-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
            <input id="apellido" type="text" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-orange-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="mail" type="email" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-orange-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Celular</label>
            <input id="celular" type="text"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-orange-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input id="password" type="password" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-orange-500"
                   placeholder="Minimo 6 caracteres" />
        </div>

        <p id="error" class="text-red-500 text-sm hidden"></p>

        <button type="submit"
                class="w-full bg-orange-500 text-white py-2 rounded font-medium hover:bg-orange-600">
            Registrarme
        </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-4">
        ¿Ya tenes cuenta?
        <a href="/src/pages/auth/login.html" class="text-orange-500 font-medium">Inicia sesion</a>
    </p>
</div>

<script type="module" src="/src/pages/auth/register.ts"></script>
</body>
</html>
