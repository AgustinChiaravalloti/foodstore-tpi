<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Categorias</title>
</head>
<body class="bg-gray-100 min-h-screen flex">

<aside class="w-56 bg-gray-800 text-white min-h-screen p-4">
    <h2 class="text-lg font-bold text-orange-400 mb-6">Administracion</h2>
    <nav class="space-y-2">
        <a href="/src/pages/admin/dashboard.html" class="block py-2 px-3 rounded hover:bg-gray-700">Dashboard</a>
        <a href="/src/pages/admin/categories.html" class="block py-2 px-3 rounded bg-gray-700">Categorias</a>
        <a href="/src/pages/admin/products.html" class="block py-2 px-3 rounded hover:bg-gray-700">Productos</a>
        <a href="/src/pages/admin/orders.html" class="block py-2 px-3 rounded hover:bg-gray-700">Pedidos</a>
        <a href="/src/pages/store/home.html" class="block py-2 px-3 rounded hover:bg-gray-700 mt-4 text-sm">Ver Tienda</a>
        <button id="logout" class="block w-full text-left py-2 px-3 rounded hover:bg-gray-700 text-red-300 text-sm">Cerrar Sesion</button>
    </nav>
</aside>

<main class="flex-1 p-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Gestion de Categorias</h1>
        <button id="nueva" class="bg-orange-500 text-white px-4 py-2 rounded font-medium hover:bg-orange-600">
            + Nueva Categoria
        </button>
    </div>

    <table class="w-full bg-white rounded-lg shadow overflow-hidden">
        <thead class="bg-gray-100">
        <tr>
            <th class="text-left p-3">ID</th>
            <th class="text-left p-3">Nombre</th>
            <th class="text-left p-3">Descripcion</th>
            <th class="text-left p-3">Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla">
        <!-- se llena por JS -->
        </tbody>
    </table>
</main>

<!-- Modal crear/editar -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
    <div class="bg-white rounded-lg p-6 w-full max-w-sm">
        <h2 id="modal-titulo" class="text-xl font-bold mb-4">Nueva Categoria</h2>
        <input type="hidden" id="edit-id" />

        <label class="block text-sm font-medium mb-1">Nombre</label>
        <input id="nombre" type="text" class="w-full border rounded px-3 py-2 mb-3" />

        <label class="block text-sm font-medium mb-1">Descripcion</label>
        <textarea id="descripcion" class="w-full border rounded px-3 py-2 mb-3"></textarea>

        <p id="modal-error" class="text-red-500 text-sm mb-2 hidden"></p>

        <button id="guardar" class="w-full bg-orange-500 text-white py-2 rounded font-medium hover:bg-orange-600 mb-2">Guardar</button>
        <button id="cancelar" class="w-full bg-gray-200 text-gray-700 py-2 rounded font-medium">Cancelar</button>
    </div>
</div>

<script type="module" src="/src/pages/admin/categories.ts"></script>
</body>
</html>
